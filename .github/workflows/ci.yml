name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: ./scripts/generate-xcodeproj.sh
      - name: Build
        run: ./scripts/build.sh
      - name: Test
        run: ./scripts/test.sh
